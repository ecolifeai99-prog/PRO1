{% extends "base.html" %}
{% block content %}
<div class="space-y-6 max-w-6xl mx-auto">
  <div>
    <h1 class="text-3xl font-bold tracking-tight">Alerts</h1>
    <p class="text-slate-500 mt-1">Open high-risk alerts generated by the risk engine.</p>
  </div>

  <div class="card overflow-hidden">
    <div class="px-6 py-5 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div>
        <h2 class="font-bold text-lg">Active Alerts</h2>
        <p class="text-sm text-slate-500 mt-1">Review and triage high-risk process incidents.</p>
      </div>
      <span id="alert-count" class="inline-flex items-center rounded-full bg-red-50 px-3 py-2 text-sm font-semibold text-red-700">Loading...</span>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-100">
          <tr>
            <th class="px-5 py-3">Process</th>
            <th class="px-5 py-3">Event</th>
            <th class="px-5 py-3">Risk Score</th>
            <th class="px-5 py-3">Status</th>
            <th class="px-5 py-3">Created</th>
          </tr>
        </thead>
        <tbody id="alerts-body" class="divide-y divide-slate-100">
          <tr><td colspan="5" class="px-5 py-10 text-center text-slate-400">Loading alerts...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadAlerts() {
  const res = await fetch('/api/alerts');
  const alerts = await res.json();
  document.getElementById('alert-count').textContent = `${alerts.length} open`;
  const body = document.getElementById('alerts-body');
  if (!alerts.length) {
    body.innerHTML = '<tr><td colspan="5" class="px-5 py-10 text-center text-slate-400">No active alerts at the moment.</td></tr>';
    return;
  }
  body.innerHTML = alerts.map(alert => `
    <tr class="hover:bg-slate-50 transition-colors">
      <td class="px-5 py-4 font-medium">${alert.process_name}</td>
      <td class="px-5 py-4 text-slate-500">${alert.message}</td>
      <td class="px-5 py-4 font-mono text-slate-800">${alert.severity}</td>
      <td class="px-5 py-4 text-slate-600">${alert.status}</td>
      <td class="px-5 py-4 text-slate-400 text-xs">${new Date(alert.created_at).toLocaleString()}</td>
    </tr>
  `).join('');
}
loadAlerts();
</script>
{% endblock %}
