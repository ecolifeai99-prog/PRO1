<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Risk Governance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top left, rgba(59,130,246,0.14), transparent 24%), linear-gradient(180deg, #f8fbff 0%, #eef2ff 55%, #ffffff 100%); }
    .card { background: #ffffff; border: 1px solid rgba(148,163,184,.18); border-radius: 24px; box-shadow: 0 20px 50px rgba(15,23,42,.1); }
    input { transition: box-shadow .2s ease, border-color .2s ease; }
    input:focus { box-shadow: 0 0 0 4px rgba(59,130,246,.12); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-3xl bg-blue-600 text-white text-xl font-bold mb-4">AI</div>
      <h1 class="text-3xl font-bold text-slate-900">Risk Governance Login</h1>
      <p class="mt-2 text-sm text-slate-500">Secure access for process intelligence and risk monitoring.</p>
    </div>

    <div class="card p-8 space-y-6">
      {% if error %}
      <div class="rounded-2xl bg-red-50 border border-red-200 p-4 text-sm text-red-700">{{ error }}</div>
      {% endif %}

      <form method="post" class="space-y-5">
        <div>
          <label class="text-sm font-semibold text-slate-700">Username</label>
          <input name="username" type="text" autocomplete="username" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900" placeholder="admin" required />
        </div>
        <div>
          <label class="text-sm font-semibold text-slate-700">Password</label>
          <input name="password" type="password" autocomplete="current-password" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900" placeholder="••••••••" required />
        </div>
        <button type="submit" class="w-full rounded-2xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white hover:bg-blue-700 transition">Sign in</button>
      </form>

      <div class="text-sm text-slate-500 border-t border-slate-200 pt-4">
        Default credentials: <strong>admin / Admin123!</strong> or <strong>user / User123!</strong>
      </div>
    </div>
  </div>
</body>
</html>
