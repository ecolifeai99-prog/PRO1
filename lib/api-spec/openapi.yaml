openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: AI-Driven Process Intelligence and Risk Governance Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Process event management
  - name: analytics
    description: Analytics and risk summaries
  - name: ml
    description: Machine learning model insights
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /events:
    get:
      operationId: getEvents
      tags: [events]
      summary: Get all events
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventWithRisk"
    post:
      operationId: createEvent
      tags: [events]
      summary: Submit a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventInput"
      responses:
        "201":
          description: Event created with risk + ML analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventWithFullAnalysis"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /events/{id}:
    get:
      operationId: getEventById
      tags: [events]
      summary: Get event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event with risk analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventWithRisk"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Dashboard summary statistics
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/risk-distribution:
    get:
      operationId: getRiskDistribution
      tags: [analytics]
      summary: Risk level distribution
      responses:
        "200":
          description: Risk distribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskDistribution"

  /analytics/events-per-process:
    get:
      operationId: getEventsPerProcess
      tags: [analytics]
      summary: Events grouped by process
      responses:
        "200":
          description: Events per process
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProcessEventCount"

  /analytics/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [analytics]
      summary: Recent high-risk events
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventWithRisk"

  /ml/model-info:
    get:
      operationId: getMlModelInfo
      tags: [ml]
      summary: ML model and algorithm information
      description: Returns metadata about all ML algorithms used in the platform
      responses:
        "200":
          description: Model info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlModelInfo"

  /ml/anomalies:
    get:
      operationId: getMlAnomalies
      tags: [ml]
      summary: Z-score anomaly detection results
      description: Returns anomaly scores for all events using Z-score statistical analysis
      responses:
        "200":
          description: Anomaly detection results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnomalyResult"

  /ml/trends:
    get:
      operationId: getMlTrends
      tags: [ml]
      summary: Exponential Moving Average risk trend analysis
      description: Returns EMA-based risk trend per process over time
      responses:
        "200":
          description: Trend analysis results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProcessTrend"

  /ml/process-health:
    get:
      operationId: getMlProcessHealth
      tags: [ml]
      summary: Composite process health scores
      description: Returns a weighted health index per process using multi-factor scoring
      responses:
        "200":
          description: Process health scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProcessHealth"

  /ml/predictions:
    get:
      operationId: getMlPredictions
      tags: [ml]
      summary: Risk velocity and next-event predictions
      description: Returns risk velocity and predicted next risk level per process using linear regression
      responses:
        "200":
          description: Prediction results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiskPrediction"

  /ml/model-stats:
    get:
      operationId: getMlModelStats
      tags: [ml]
      summary: Overall ML model performance statistics
      description: Returns aggregate model metrics across all algorithms
      responses:
        "200":
          description: Model performance stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlModelStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ApiError:
      type: object
      properties:
        error:
          type: string
      required: [error]

    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    CreateEventInput:
      type: object
      properties:
        process_name:
          type: string
        event_type:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 5
        likelihood:
          type: integer
          minimum: 1
          maximum: 5
      required: [process_name, event_type, severity, likelihood]

    EventWithRisk:
      type: object
      properties:
        id:
          type: string
        process_name:
          type: string
        event_type:
          type: string
        severity:
          type: integer
        likelihood:
          type: integer
        timestamp:
          type: string
        risk_score:
          type: integer
        risk_level:
          type: string
          enum: [Low, Medium, High]
        recommendation:
          type: string
      required: [id, process_name, event_type, severity, likelihood, timestamp, risk_score, risk_level, recommendation]

    EventWithFullAnalysis:
      type: object
      properties:
        id:
          type: string
        process_name:
          type: string
        event_type:
          type: string
        severity:
          type: integer
        likelihood:
          type: integer
        timestamp:
          type: string
        risk_score:
          type: integer
        risk_level:
          type: string
          enum: [Low, Medium, High]
        recommendation:
          type: string
        weighted_score:
          type: number
        anomaly_score:
          type: number
        is_anomaly:
          type: boolean
        confidence:
          type: number
        contributing_factors:
          type: array
          items:
            type: string
      required: [id, process_name, event_type, severity, likelihood, timestamp, risk_score, risk_level, recommendation, weighted_score, anomaly_score, is_anomaly, confidence, contributing_factors]

    AnalyticsSummary:
      type: object
      properties:
        total_events:
          type: integer
        high_risk_count:
          type: integer
        medium_risk_count:
          type: integer
        low_risk_count:
          type: integer
        avg_risk_score:
          type: number
        recent_events:
          type: array
          items:
            $ref: "#/components/schemas/EventWithRisk"
      required: [total_events, high_risk_count, medium_risk_count, low_risk_count, avg_risk_score, recent_events]

    RiskDistribution:
      type: object
      properties:
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
      required: [high, medium, low]

    ProcessEventCount:
      type: object
      properties:
        process_name:
          type: string
        count:
          type: integer
        high_risk:
          type: integer
        medium_risk:
          type: integer
        low_risk:
          type: integer
      required: [process_name, count, high_risk, medium_risk, low_risk]

    AnomalyResult:
      type: object
      properties:
        id:
          type: string
        process_name:
          type: string
        event_type:
          type: string
        risk_score:
          type: integer
        z_score:
          type: number
        anomaly_score:
          type: number
        is_anomaly:
          type: boolean
        timestamp:
          type: string
      required: [id, process_name, event_type, risk_score, z_score, anomaly_score, is_anomaly, timestamp]

    ProcessTrend:
      type: object
      properties:
        process_name:
          type: string
        ema_current:
          type: number
        ema_previous:
          type: number
        trend_direction:
          type: string
          enum: [rising, falling, stable]
        trend_strength:
          type: number
        event_count:
          type: integer
        time_series:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
      required: [process_name, ema_current, ema_previous, trend_direction, trend_strength, event_count, time_series]

    TimeSeriesPoint:
      type: object
      properties:
        timestamp:
          type: string
        risk_score:
          type: integer
        ema:
          type: number
      required: [timestamp, risk_score, ema]

    ProcessHealth:
      type: object
      properties:
        process_name:
          type: string
        health_score:
          type: number
        health_label:
          type: string
          enum: [Critical, Poor, Fair, Good, Excellent]
        event_count:
          type: integer
        avg_severity:
          type: number
        avg_likelihood:
          type: number
        high_risk_ratio:
          type: number
        recency_penalty:
          type: number
      required: [process_name, health_score, health_label, event_count, avg_severity, avg_likelihood, high_risk_ratio, recency_penalty]

    RiskPrediction:
      type: object
      properties:
        process_name:
          type: string
        risk_velocity:
          type: number
        predicted_risk_score:
          type: number
        predicted_risk_level:
          type: string
          enum: [Low, Medium, High]
        confidence_interval_low:
          type: number
        confidence_interval_high:
          type: number
        regression_slope:
          type: number
        data_points:
          type: integer
      required: [process_name, risk_velocity, predicted_risk_score, predicted_risk_level, confidence_interval_low, confidence_interval_high, regression_slope, data_points]

    MlAlgorithmInfo:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        description:
          type: string
        formula:
          type: string
        use_case:
          type: string
        accuracy:
          type: number
      required: [name, type, description, formula, use_case, accuracy]

    MlModelInfo:
      type: object
      properties:
        model_version:
          type: string
        total_algorithms:
          type: integer
        algorithms:
          type: array
          items:
            $ref: "#/components/schemas/MlAlgorithmInfo"
        last_trained:
          type: string
        training_samples:
          type: integer
      required: [model_version, total_algorithms, algorithms, last_trained, training_samples]

    MlModelStats:
      type: object
      properties:
        total_events_analyzed:
          type: integer
        anomalies_detected:
          type: integer
        anomaly_rate:
          type: number
        avg_confidence:
          type: number
        processes_monitored:
          type: integer
        high_risk_processes:
          type: integer
        model_accuracy:
          type: number
        precision:
          type: number
        recall:
          type: number
        f1_score:
          type: number
      required: [total_events_analyzed, anomalies_detected, anomaly_rate, avg_confidence, processes_monitored, high_risk_processes, model_accuracy, precision, recall, f1_score]
